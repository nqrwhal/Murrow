# Murrow outlet registry.
#
# spectrum / spectrum_score are external-context labels only (Murrow does not
# invent its own lean ratings). They are placeholder consensus values pending
# reconciliation against a cited source (AllSides / Ad Fontes Media) — record the
# citation in meta.json when that pass happens. Wire services (is_baseline=true)
# are the neutral yardstick and are excluded from the competing ELO leaderboard.

